<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ENTR 403 Blog - Sawyer Smith</title>

    <!-- Import main site styles -->
    <link rel="stylesheet" href="../src/styles/major.css" />

    <!-- Blog-specific styles -->
    <link rel="stylesheet" href="blog.css" />

    <!-- Favicon (reuse from main site if exists) -->
    <link rel="icon" type="image/svg+xml" href="../public/icons/favicon.svg" />
  </head>
  <body>
    <!-- Main Content -->
    <main style="padding: var(--page-padding, 5rem) 1.5rem">
      <!-- Blog Header -->
      <section class="section-block" style="max-width: 800px; margin: 0 auto">
        <div class="hash-divider" data-hash-divider></div>
        <h1 style="margin-bottom: 0.5rem">ENTR 403 Blog</h1>
        <p
          style="
            color: var(--text-muted, #f9f9f9);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
          "
        >
          by Sawyer Smith
        </p>
        <p style="color: var(--text-muted, #f9f9f9); margin-bottom: 3rem">
          Private blog for course notes, reflections, and assignments.
          Accessible only via direct URL.
        </p>
      </section>

      <!-- Post List Container (dynamically populated by blog.js) -->
      <section class="blog-post-list" id="post-list" style="margin-top: 3rem">
        <!-- Posts will be injected here by JavaScript -->
        <noscript>
          <div
            class="box"
            style="max-width: 800px; margin: 0 auto; text-align: center"
          >
            <p>JavaScript is required to view the blog post list.</p>
            <p style="margin-top: 1rem">
              <a
                href="posts/week-01-introduction.html"
                style="color: var(--primary-color, #00ff00)"
              >
                View Posts Directly
              </a>
            </p>
          </div>
        </noscript>
      </section>
    </main>

    <!-- Hash Divider Script (from main site) -->
    <script>
      // Generate dynamic hash dividers
      function updateHashDividers() {
        const dividers = document.querySelectorAll("[data-hash-divider]");
        dividers.forEach((div) => {
          const tempSpan = document.createElement("span");
          tempSpan.style.visibility = "hidden";
          tempSpan.style.position = "absolute";
          tempSpan.textContent = "#";
          tempSpan.style.font = window.getComputedStyle(div).font;
          document.body.appendChild(tempSpan);
          const charWidth = tempSpan.offsetWidth;
          document.body.removeChild(tempSpan);

          const divWidth = div.offsetWidth;
          const numChars = Math.floor(divWidth / charWidth);
          div.textContent = "#".repeat(numChars);
        });
      }

      window.addEventListener("load", updateHashDividers);
      window.addEventListener("resize", updateHashDividers);
    </script>

    <!-- Blog Post List Renderer -->
    <script src="blog.js"></script>
  </body>
</html>
